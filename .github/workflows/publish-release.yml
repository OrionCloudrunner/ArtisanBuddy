name: Publish release asset

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify committed plugin zip exists
        run: |
          test -f dist/ArtisanBuddy.zip
          ls -lh dist/ArtisanBuddy.zip

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ArtisanBuddy.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
